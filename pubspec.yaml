name: prayerrise
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.0.2
  http: ^1.2.0
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1
  just_audio: ^0.9.33
  audio_session: ^0.1.7
  flutter_local_notifications: ^15.1.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/adhan.mp3
    - assets/images/nature/
  fonts:
    - family: QuranFont
      fonts:
        - asset: lib/assets/fonts/Amiri-Regular.ttf